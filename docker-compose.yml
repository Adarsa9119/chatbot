version: "3.9"

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads_data:
  logs_data:

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  app_net:
    driver: bridge

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg15
    container_name: docchat_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-docchat}
      POSTGRES_USER:     ${POSTGRES_USER:-docchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro   # auto-run on first init
    ports:
      - "5432:5432"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docchat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: docchat_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-docchat}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-docchat}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/storage/logs
      # Hot-reload in development — comment out for production
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - app_net
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React frontend (Vite dev server) ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    container_name: docchat_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3