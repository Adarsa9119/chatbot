# nginx.conf — Reverse proxy for DocChat
# Serves the React SPA and proxies /api requests to the FastAPI backend.

upstream backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Client body size (for file uploads) ───────────────────────────────
    client_max_body_size 55M;

    # ── React SPA — static assets ─────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # Cache hashed assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # Health check endpoint (answered by nginx, not the backend)
    location = /health {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain;
    }

    # ── API proxy ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts — generous for long RAG completions
        proxy_connect_timeout   10s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
        send_timeout            120s;

        # Disable buffering for SSE / streaming responses
        proxy_buffering         off;
        proxy_cache             off;
    }

    # ── SPA fallback — all other routes served by index.html ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block dot-files ───────────────────────────────────────────────────
    location ~ /\. {
        deny  all;
        return 404;
    }
}